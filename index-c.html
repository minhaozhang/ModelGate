    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #050508;
            --bg-card: rgba(235, 234, 250, 0.03);
            --bg-card-hover: rgba(235, 234, 250, 0.06);
            --border: rgba(235, 234, 250, 0.08);
            --border-hover: rgba(235, 234, 250, 0.18);
            --text-primary: #ededf8;
            --text-secondary: #ededf8b8;
            --text-muted: #ededf8a3;
            --text-faint: #ededf87a;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        /* ── Canvas particle background ── */
        #particle-canvas {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        /* ── Animated grid ── */
        .grid-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            background-image:
                linear-gradient(rgba(235, 234, 250, 0.035) 1px, transparent 1px),
                linear-gradient(90deg, rgba(235, 234, 250, 0.035) 1px, transparent 1px);
            background-size: 64px 64px;
            mask-image: radial-gradient(ellipse 80% 60% at 50% 40%, black 20%, transparent 70%);
            -webkit-mask-image: radial-gradient(ellipse 80% 60% at 50% 40%, black 20%, transparent 70%);
        }

        /* ── Scanning line ── */
        .scan-line {
            position: fixed;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent 0%, rgba(129, 140, 248, 0.15) 30%, rgba(129, 140, 248, 0.3) 50%, rgba(129, 140, 248, 0.15) 70%, transparent 100%);
            z-index: 0;
            pointer-events: none;
            animation: scanDown 8s linear infinite;
        }

        @keyframes scanDown {
            0% { top: -2px; opacity: 0; }
            5% { opacity: 1; }
            95% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }

        /* ── Floating orbs ── */
        .orb {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            filter: blur(80px);
        }

        .orb-1 {
            width: 500px; height: 500px;
            top: -10%; left: 20%;
            background: rgba(109, 76, 255, 0.10);
            animation: orbFloat1 12s ease-in-out infinite;
        }

        .orb-2 {
            width: 400px; height: 400px;
            bottom: 5%; right: 10%;
            background: rgba(56, 130, 246, 0.08);
            animation: orbFloat2 10s ease-in-out infinite;
        }

        .orb-3 {
            width: 300px; height: 300px;
            top: 50%; left: -5%;
            background: rgba(99, 102, 241, 0.07);
            animation: orbFloat3 14s ease-in-out infinite;
        }

        @keyframes orbFloat1 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(40px, 30px) scale(1.05); }
            66% { transform: translate(-20px, -20px) scale(0.95); }
        }

        @keyframes orbFloat2 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(-30px, -40px) scale(1.08); }
        }

        @keyframes orbFloat3 {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(60px, -30px); }
        }

        /* ── Hero animations ── */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes shimmer {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }

        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 8px rgba(99, 102, 241, 0.4); }
            50% { box-shadow: 0 0 16px rgba(99, 102, 241, 0.8), 0 0 32px rgba(99, 102, 241, 0.3); }
        }

        @keyframes borderGlow {
            0%, 100% { border-color: rgba(129, 140, 248, 0.08); }
            50% { border-color: rgba(129, 140, 248, 0.25); }
        }

        @keyframes countUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-in {
            opacity: 0;
            animation: fadeInUp 0.8s cubic-bezier(0.6, 0.6, 0, 1) forwards;
        }

        .delay-1 { animation-delay: 0.15s; }
        .delay-2 { animation-delay: 0.3s; }
        .delay-3 { animation-delay: 0.45s; }
        .delay-4 { animation-delay: 0.6s; }

        .text-gradient {
            background: linear-gradient(180deg, #ededf8f5, #ededf8c4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .text-gradient-shimmer {
            background: linear-gradient(90deg, #a78bfa, #818cf8, #c4b5fd, #6366f1, #a78bfa);
            background-size: 200% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmer 4s linear infinite;
        }

        .pulse-dot {
            width: 6px; height: 6px; border-radius: 50%; background: #6366f1;
            animation: pulse-glow 2s ease-in-out infinite;
        }

        /* ── Cards ── */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            transition: all 0.3s cubic-bezier(0.6, 0.6, 0, 1);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: inherit;
            background: radial-gradient(500px circle at var(--mx, 50%) var(--my, 50%), rgba(109, 76, 255, 0.06), transparent 40%);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.4s;
        }

        .card:hover {
            border-color: var(--border-hover);
            background: var(--bg-card-hover);
            transform: translateY(-2px);
        }

        .card:hover::before { opacity: 1; }

        /* ── Stats border glow ── */
        .stats-section {
            animation: borderGlow 4s ease-in-out infinite;
        }

        /* ── Nav ── */
        .nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            border-bottom: 1px solid var(--border);
            background: rgba(5, 5, 8, 0.5);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
        }

        .nav::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(129, 140, 248, 0.2), transparent);
        }

        /* ── Buttons ── */
        .btn-primary {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 10px 22px;
            background: linear-gradient(180deg, rgba(235, 234, 250, 0.12), rgba(235, 234, 250, 0.06));
            border: 1px solid rgba(235, 234, 250, 0.14);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 14px; font-weight: 500;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.6, 0.6, 0, 1);
            text-decoration: none;
            position: relative;
            overflow: hidden;
        }

        .btn-primary::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(129, 140, 248, 0.1), transparent);
            transform: translateX(-100%);
            transition: transform 0.5s;
        }

        .btn-primary:hover::before { transform: translateX(100%); }

        .btn-primary:hover {
            border-color: rgba(129, 140, 248, 0.3);
            box-shadow: 0 0 24px rgba(109, 76, 255, 0.12), 0 0 60px rgba(109, 76, 255, 0.06);
        }

        .btn-secondary {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 10px 22px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-muted);
            font-size: 14px; font-weight: 500;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.6, 0.6, 0, 1);
            text-decoration: none;
        }

        .btn-secondary:hover {
            border-color: var(--border-hover);
            color: var(--text-primary);
            background: var(--bg-card);
        }

        .stat-number {
            font-variant-numeric: tabular-nums;
            font-size: 28px; font-weight: 600; letter-spacing: -0.02em;
        }

        @media (min-width: 640px) {
            .stat-number { font-size: 40px; }
        }

        .divider-line {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(129, 140, 248, 0.12), transparent);
            position: relative;
            overflow: hidden;
        }

        .divider-line::after {
            content: '';
            position: absolute;
            top: 0; left: -30%;
            width: 30%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(129, 140, 248, 0.3), transparent);
            animation: dividerSweep 4s ease-in-out infinite;
        }

        @keyframes dividerSweep {
            0% { left: -30%; }
            100% { left: 100%; }
        }

        .feature-icon {
            width: 36px; height: 36px;
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            background: rgba(109, 76, 255, 0.08);
            border: 1px solid rgba(109, 76, 255, 0.12);
            transition: all 0.3s;
        }

        .card:hover .feature-icon {
            background: rgba(109, 76, 255, 0.14);
            box-shadow: 0 0 20px rgba(109, 76, 255, 0.15);
        }

        .lang-select {
            appearance: none;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 6px 10px;
            color: var(--text-muted);
            font-size: 13px;
            cursor: pointer;
            outline: none;
            transition: all 0.2s;
        }

        .lang-select:hover {
            border-color: var(--border-hover);
            color: var(--text-primary);
        }

        .code-block {
            background: rgba(235, 234, 250, 0.03);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 16px;
            font-family: 'SF Mono', SFMono-Regular, Menlo, monospace;
            font-size: 13px;
            color: #a5b4fc;
            word-break: break-all;
            position: relative;
            overflow: hidden;
        }

        .code-block::after {
            content: '';
            position: absolute;
            top: 0; left: -20%;
            width: 20%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(129, 140, 248, 0.04), transparent);
            animation: codeSweep 6s ease-in-out infinite;
        }

        @keyframes codeSweep {
            0% { left: -20%; }
            100% { left: 120%; }
        }

        .scroll-reveal {
            opacity: 0;
            transform: translateY(24px);
            transition: opacity 0.7s cubic-bezier(0.6, 0.6, 0, 1), transform 0.7s cubic-bezier(0.6, 0.6, 0, 1);
        }

        .scroll-reveal.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .step-item {
            opacity: 0;
            transform: translateX(-12px);
            transition: all 0.5s cubic-bezier(0.6, 0.6, 0, 1);
        }

        .step-item.visible {
            opacity: 1;
            transform: translateX(0);
        }

        @media (max-width: 639px) {
            .hero-title { font-size: 34px !important; line-height: 40px !important; }
            .quick-start-grid { grid-template-columns: 1fr !important; }
            .stats-section { grid-template-columns: 1fr !important; }
        }

        .flip-card {
            perspective: 800px;
            width: 100%;
        }

        .flip-card-inner {
            position: relative;
            width: 100%;
            transition: transform 0.6s cubic-bezier(0.6, 0.6, 0, 1);
            transform-style: preserve-3d;
        }

        .flip-card-inner.flipped {
            transform: rotateY(180deg);
        }

        .flip-card-front,
        .flip-card-back {
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }

        .flip-card-back {
            position: absolute;
            inset: 0;
            transform: rotateY(180deg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 28px 20px;
        }

        .flip-card-front {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 28px 20px;
        }

        .stat-badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 100px;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.02em;
            background: rgba(109, 76, 255, 0.10);
            color: #a78bfa;
            border: 1px solid rgba(109, 76, 255, 0.15);
            margin-top: 8px;
        }
    </style>
</head>

    <script>
    (function() {
        var canvas = document.getElementById('particle-canvas');
        var ctx = canvas.getContext('2d');
        var particles = [];
        var mouseX = 0, mouseY = 0;
        var width, height;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        resize();
        window.addEventListener('resize', resize);
        document.addEventListener('mousemove', function(e) {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        var count = window.innerWidth < 768 ? 60 : 120;
        for (var i = 0; i < count; i++) {
            particles.push({
                x: Math.random() * width,
                y: Math.random() * height,
                vx: (Math.random() - 0.5) * 0.3,
                vy: (Math.random() - 0.5) * 0.3,
                size: Math.random() * 1.5 + 0.5,
                alpha: Math.random() * 0.3 + 0.1,
                hue: Math.random() > 0.5 ? 240 : 260
            });
        }

        function drawParticles() {
            ctx.clearRect(0, 0, width, height);

            for (var i = 0; i < particles.length; i++) {
                var p = particles[i];

                var dx = mouseX - p.x;
                var dy = mouseY - p.y;
                var dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 200) {
                    var force = (200 - dist) / 200 * 0.02;
                    p.vx += dx * force * 0.01;
                    p.vy += dy * force * 0.01;
                }

                p.x += p.vx;
                p.y += p.vy;

                p.vx *= 0.99;
                p.vy *= 0.99;

                if (p.x < 0) p.x = width;
                if (p.x > width) p.x = 0;
                if (p.y < 0) p.y = height;
                if (p.y > height) p.y = 0;

                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(129, 140, 248, ' + p.alpha + ')';
                ctx.fill();

                for (var j = i + 1; j < particles.length; j++) {
                    var p2 = particles[j];
                    var d = Math.sqrt(Math.pow(p.x - p2.x, 2) + Math.pow(p.y - p2.y, 2));
                    if (d < 120) {
                        ctx.beginPath();
                        ctx.moveTo(p.x, p.y);
                        ctx.lineTo(p2.x, p2.y);
                        ctx.strokeStyle = 'rgba(129, 140, 248, ' + (1 - d / 120) * 0.08 + ')';
                        ctx.lineWidth = 0.5;
                        ctx.stroke();
                    }
                }
            }

            requestAnimationFrame(drawParticles);
        }

        drawParticles();
    })();

    var APP_BASE_PATH = "/modelgate";

    function readCookie(name) {
        var cookies = document.cookie.split(";").map(function(item) { return item.trim(); });
        var found = cookies.find(function(item) { return item.startsWith(name + "="); });
        return found ? decodeURIComponent(found.split("=")[1]) : "";
    }

    function getCurrentLang() {
        var cookieLang = readCookie("lang");
        if (cookieLang === "zh" || cookieLang === "en") return cookieLang;
        return navigator.language && navigator.language.toLowerCase().includes("zh") ? "zh" : "en";
    }

    function formatNumber(n) {
        if (n == null) return '-';
        return n.toLocaleString();
    }

    function animateCounter(el, target) {
        if (!target && target !== 0) { el.textContent = '-'; return; }
        var start = 0;
        var duration = 2000;
        var startTime = null;
        function step(ts) {
            if (!startTime) startTime = ts;
            var progress = Math.min((ts - startTime) / duration, 1);
            var eased = 1 - Math.pow(1 - progress, 3);
            el.textContent = Math.floor(eased * target).toLocaleString();
            if (progress < 1) requestAnimationFrame(step);
        }
        requestAnimationFrame(step);
    }

    function applyLang(lang) {
        var t = translations[lang] || translations.en;
        document.documentElement.lang = lang;
        document.getElementById("lang-select").value = lang;
        document.getElementById("badge-text").textContent = t.badge;
        document.getElementById("hero-title-line1").textContent = t.heroLine1;
        document.getElementById("hero-title-line2").textContent = t.heroLine2;
        document.getElementById("hero-desc").textContent = t.heroDesc;
        document.getElementById("user-login-btn").textContent = t.userLogin;
        document.getElementById("docs-btn").textContent = t.docsBtn;
        document.getElementById("stat-requests-label").textContent = t.totalRequests;
        document.getElementById("stat-tokens-label").textContent = t.totalTokens;
        document.getElementById("stat-today-requests-label").textContent = t.todayRequests;
        document.getElementById("stat-today-tokens-label").textContent = t.todayTokens;
        document.getElementById("badge-total-req").textContent = t.badgeTotal;
        document.getElementById("badge-total-tok").textContent = t.badgeTotal;
        document.getElementById("badge-today-req").textContent = t.badgeToday;
        document.getElementById("badge-today-tok").textContent = t.badgeToday;
        document.getElementById("features-title").textContent = t.featuresTitle;
        document.getElementById("feat-1-title").textContent = t.feat1Title;
        document.getElementById("feat-1-desc").textContent = t.feat1Desc;
        document.getElementById("feat-2-title").textContent = t.feat2Title;
        document.getElementById("feat-2-desc").textContent = t.feat2Desc;
        document.getElementById("feat-3-title").textContent = t.feat3Title;
        document.getElementById("feat-3-desc").textContent = t.feat3Desc;
        document.getElementById("quick-start-title").textContent = t.quickStart;
        var steps = [t.step1, t.step2, t.step3, t.step4];
        document.getElementById("steps-list").innerHTML = steps.map(function(s, i) {
            return '<li class="step-item" style="transition-delay:' + (i * 0.12) + 's">' + s + '</li>';
        }).join('');
        document.getElementById("base-url-label").textContent = t.baseUrl;
        document.getElementById("base-url-value").textContent = window.location.origin + APP_BASE_PATH + "/v1";
        document.getElementById("opencode-desc").textContent = t.opencodeDesc;
        document.getElementById("opencode-link").textContent = t.visitOpenCode;
    }

    var flipInterval = null;
    var isFlipped = false;

    function startFlipCycle() {
        if (flipInterval) return;
        flipInterval = setInterval(function() {
            var cardReq = document.querySelector('#flip-requests .flip-card-inner');
            var cardTok = document.querySelector('#flip-tokens .flip-card-inner');
            isFlipped = !isFlipped;
            if (isFlipped) {
                cardReq.classList.add('flipped');
                setTimeout(function() { cardTok.classList.add('flipped'); }, 500);
            } else {
                cardReq.classList.remove('flipped');
                setTimeout(function() { cardTok.classList.remove('flipped'); }, 500);
            }
        }, 4000);
    }

    function refreshStats() {
        fetch('https://leturx.cc/modelgate/api/public/stats')
            .then(function(r) { return r.json(); })
            .then(function(data) {
                animateCounter(document.getElementById('stat-requests'), data.total_requests);
                animateCounter(document.getElementById('stat-tokens'), data.total_tokens);
                animateCounter(document.getElementById('stat-today-requests'), data.today_requests || 0);
                animateCounter(document.getElementById('stat-today-tokens'), data.today_tokens || 0);
                startFlipCycle();
            })
            .catch(function() {
                document.getElementById('stat-requests').textContent = '-';
                document.getElementById('stat-tokens').textContent = '-';
                document.getElementById('stat-today-requests').textContent = '-';
                document.getElementById('stat-today-tokens').textContent = '-';
            });
    }

    document.getElementById("lang-select").addEventListener("change", function(event) {
        var lang = event.target.value;
        document.cookie = "lang=" + lang + ";path=/;max-age=31536000";
        applyLang(lang);
    });

    document.querySelectorAll('.card').forEach(function(card) {
        card.addEventListener('mousemove', function(e) {
            var rect = card.getBoundingClientRect();
            card.style.setProperty('--mx', (e.clientX - rect.left) + 'px');
            card.style.setProperty('--my', (e.clientY - rect.top) + 'px');
        });
    });

    var observer = new IntersectionObserver(function(entries) {
        entries.forEach(function(entry) {
            if (entry.isIntersecting) {
                entry.target.classList.add('visible');
                var steps = entry.target.querySelectorAll('.step-item');
                steps.forEach(function(s) { s.classList.add('visible'); });
            }
        });
    }, { threshold: 0.1 });

    document.querySelectorAll('.scroll-reveal').forEach(function(el) {
        observer.observe(el);
    });

    applyLang(getCurrentLang());
    refreshStats();
    setInterval(refreshStats, 600000);
    </script>
