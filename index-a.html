    <style>
        body { font-family: 'Exo 2', sans-serif; }

            100% { transform: translateY(50px); }
        }
        .grid-bg {
            background-image:

        @keyframes glow-pulse {

            50% { opacity: 0.8; }

        .glow-line {
            background: linear-gradient(90deg, transparent, rgba(56, 189, 248, 0.6), transparent);
            height: 1px;
            animation: glow-pulse 3s ease-in-out infinite;
        }
        .stat-number { font-variant-numeric: tabular-nums; }
        @keyframes scan-line {
            0% { top: -10%; }
            100% { top: 110%; }
        }
        .scan-effect::after {
            content: '';
            position: absolute;
            left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(56, 189, 248, 0.3), transparent);
            animation: scan-line 4s linear infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

    <script>
        var APP_BASE_PATH = "/modelgate";
        var translations = {
            en: {
                heroTitle: "UNIFIED MODEL GATEWAY",
                heroDesc: "One endpoint for all your LLM APIs. Proxy, monitor, and manage every provider through a single unified interface.",
                userLogin: "Get Started",
                docsBtn: "View Source",
                totalRequests: "TOTAL REQUESTS",
                totalTokens: "TOKENS CONSUMED",
                feat1Title: "Multi-Provider Proxy",
                feat1Desc: "Route requests to Zhipu, DeepSeek, Ollama, Minimax and more through a single OpenAI-compatible API.",
                feat2Title: "Usage Analytics",
                feat2Desc: "Real-time dashboards with per-provider, per-model, and per-key metrics and monitoring.",
                feat3Title: "Access Control",
                feat3Desc: "API key management with granular model-level permissions and concurrency limits.",
                step1: "1. Sign in with an API key",
                step2: "2. Check /v1/models for available models",
                step3: "3. Generate OpenCode config if needed",
                step4: "4. Monitor usage via admin panel",
                baseUrl: "Base URL",
                opencodeDesc: "Generate OpenCode configuration from the dashboard.",
                visitOpenCode: "Visit OpenCode \u2192"
            },
            zh: {
                heroTitle: "统一的模型网关",
                heroDesc: "一个端点接入所有 LLM API。通过统一接口代理、监控和管理每一个模型供应商。",
                userLogin: "\u5F00\u59CB\u4F7F\u7528",
                docsBtn: "\u67E5\u770B\u6E90\u7801",
                totalRequests: "\u603B\u8C03\u7528\u91CF",
                totalTokens: "\u6D88\u8017 TOKENS",
                feat1Title: "\u591A\u4F9B\u5E94\u5546\u4EE3\u7406",
                feat1Desc: "\u901A\u8FC7\u5355\u4E2A OpenAI \u517C\u5BB9 API \u8F6C\u53D1\u8BF7\u6C42\u81F3\u667A\u8C31\u3001DeepSeek\u3001Ollama\u3001Minimax \u7B49\u3002",
                feat2Title: "\u4F7F\u7528\u5206\u6790",
                feat2Desc: "\u5B9E\u65F6\u4EEA\u8868\u76D8\uFF0C\u6309\u4F9B\u5E94\u5546\u3001\u6A21\u578B\u3001\u5BC6\u94A5\u7EF4\u5EA6\u76D1\u63A7\u3002",
                feat3Title: "\u8BBF\u95EE\u63A7\u5236",
                feat3Desc: "API Key \u7BA1\u7406\uFF0C\u7EC6\u7C92\u5EA6\u6A21\u578B\u7EA7\u6743\u9650\u548C\u5E76\u53D1\u9650\u5236\u3002",
                step1: "1. \u4F7F\u7528 API Key \u767B\u5F55",
                step2: "2. \u901A\u8FC7 /v1/models \u786E\u8BA4\u53EF\u7528\u6A21\u578B",
                step3: "3. \u5982\u9700\u8981\uFF0C\u751F\u6210 OpenCode \u914D\u7F6E",
                step4: "4. \u901A\u8FC7\u7BA1\u7406\u9762\u677F\u67E5\u770B\u76D1\u63A7",
                baseUrl: "\u793A\u4F8B Base URL",
                opencodeDesc: "\u4ECE\u4EEA\u8868\u76D8\u751F\u6210 OpenCode \u914D\u7F6E\u3002",
                visitOpenCode: "\u8BBF\u95EE OpenCode \u2192"
            }
        };

        function readCookie(name) {
            var cookies = document.cookie.split(";").map(function(item) { return item.trim(); });
            var found = cookies.find(function(item) { return item.startsWith(name + "="); });
            return found ? decodeURIComponent(found.split("=")[1]) : "";
        }

        function getCurrentLang() {
            var cookieLang = readCookie("lang");
            if (cookieLang === "zh" || cookieLang === "en") return cookieLang;
            return navigator.language && navigator.language.toLowerCase().includes("zh") ? "zh" : "en";
        }

        function formatNumber(n) {
            if (n == null) return '-';
            return n.toLocaleString();
        }

        function applyLang(lang) {
            var t = translations[lang] || translations.en;
            document.documentElement.lang = lang;
            document.getElementById("lang-select").value = lang;
            document.getElementById("hero-title-line1").textContent = t.heroTitle;
            document.getElementById("hero-desc").textContent = t.heroDesc;
            document.getElementById("user-login-btn").textContent = t.userLogin;
            document.getElementById("docs-btn").textContent = t.docsBtn;
            document.getElementById("stat-requests-label").textContent = t.totalRequests;
            document.getElementById("stat-tokens-label").textContent = t.totalTokens;
            document.getElementById("feat-1-title").textContent = t.feat1Title;
            document.getElementById("feat-1-desc").textContent = t.feat1Desc;
            document.getElementById("feat-2-title").textContent = t.feat2Title;
            document.getElementById("feat-2-desc").textContent = t.feat2Desc;
            document.getElementById("feat-3-title").textContent = t.feat3Title;
            document.getElementById("feat-3-desc").textContent = t.feat3Desc;
            document.getElementById("steps-list").innerHTML = '<li>' + t.step1 + '</li><li>' + t.step2 + '</li><li>' + t.step3 + '</li><li>' + t.step4 + '</li>';
            document.getElementById("base-url-label").textContent = t.baseUrl;
            document.getElementById("base-url-value").textContent = window.location.origin + APP_BASE_PATH + "/v1";
            document.getElementById("opencode-desc").textContent = t.opencodeDesc;
            document.getElementById("opencode-link").textContent = t.visitOpenCode;
        }

        function refreshStats() {
            fetch('https://leturx.cc/modelgate/api/public/stats')
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    document.getElementById('stat-requests').textContent = formatNumber(data.total_requests);
                    document.getElementById('stat-tokens').textContent = formatNumber(data.total_tokens);
                })
                .catch(function() {
                    document.getElementById('stat-requests').textContent = '-';
                    document.getElementById('stat-tokens').textContent = '-';
                });
        }

        document.getElementById("lang-select").addEventListener("change", function(event) {
            var lang = event.target.value;
            document.cookie = "lang=" + lang + ";path=/;max-age=31536000";
            applyLang(lang);
        });

        applyLang(getCurrentLang());
        refreshStats();
        setInterval(refreshStats, 600000);
    </script>
