services:
  modelgate:
    build: .
    expose:
      - "8765"
    volumes:
      - ./logs:/app/logs
      - ./reports:/app/reports
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "8765:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./static:/usr/share/nginx/html/static:ro
    depends_on:
      - modelgate
    restart: unless-stopped
