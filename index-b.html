    <script>
        (function() {
            var scene, camera, renderer, particles;
            var mouseX = 0, mouseY = 0;

            function init() {
                var container = document.getElementById('particles-container');
                scene = new THREE.Scene();
                camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                camera.position.z = 50;

                renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                renderer.setClearColor(0x020617, 1);
                container.appendChild(renderer.domElement);

                createParticles();
                document.addEventListener('mousemove', function(e) {
                    mouseX = (e.clientX / window.innerWidth) * 2 - 1;
                    mouseY = -(e.clientY / window.innerHeight) * 2 + 1;
                });
                window.addEventListener('resize', function() {
                    camera.aspect = window.innerWidth / window.innerHeight;
                    camera.updateProjectionMatrix();
                    renderer.setSize(window.innerWidth, window.innerHeight);
                });
                animate();
            }

            function createParticles() {
                var particleCount = window.innerWidth < 768 ? 600 : 1800;
                var geometry = new THREE.BufferGeometry();
                var positions = new Float32Array(particleCount * 3);
                var colors = new Float32Array(particleCount * 3);
                var sizes = new Float32Array(particleCount);
                var rotations = new Float32Array(particleCount);
                var particleData = [];

                var colorPalette = [
                    [0.22, 0.47, 0.97],
                    [0.50, 0.55, 0.98],
                    [0.65, 0.55, 0.98],
                    [0.0, 0.73, 0.83],
                    [0.26, 0.83, 0.47],
                ];

                var rings = 10;
                var particlesPerRing = Math.floor(particleCount / rings);

                for (var ring = 0; ring < rings; ring++) {
                    var ringRadius = 10 + ring * 10;
                    var particlesInThisRing = particlesPerRing + (ring === rings - 1 ? particleCount % rings : 0);
                    for (var i = 0; i < particlesInThisRing; i++) {
                        var idx = ring * particlesPerRing + i;
                        if (idx >= particleCount) break;
                        var angle = (i / particlesInThisRing) * Math.PI * 2;
                        var x = Math.cos(angle) * ringRadius;
                        var y = Math.sin(angle) * ringRadius * 0.6;
                        var z = (Math.random() - 0.5) * 25;
                        positions[idx * 3] = x;
                        positions[idx * 3 + 1] = y;
                        positions[idx * 3 + 2] = z;
                        var color = colorPalette[Math.floor(Math.random() * colorPalette.length)];
                        colors[idx * 3] = color[0] + (Math.random() - 0.5) * 0.08;
                        colors[idx * 3 + 1] = color[1] + (Math.random() - 0.5) * 0.08;
                        colors[idx * 3 + 2] = color[2] + (Math.random() - 0.5) * 0.08;
                        var depthFactor = (z + 10) / 20;
                        sizes[idx] = (2 + Math.random() * 2.5) * (0.7 + depthFactor * 0.3);
                        rotations[idx] = angle + Math.PI / 2;
                        particleData.push({
                            x: x, y: y, z: z,
                            ringRadius: ringRadius,
                            baseAngle: angle,
                            angularSpeed: 0.0003 + Math.random() * 0.0005,
                            wobblePhase: Math.random() * Math.PI * 2,
                            wobbleSpeed: 0.5 + Math.random(),
                            wobbleAmount: 0.3 + Math.random() * 0.5,
                            pulsePhase: Math.random() * Math.PI * 2
                        });
                    }
                }

                geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
                geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
                geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
                geometry.setAttribute('rotation', new THREE.BufferAttribute(rotations, 1));
                geometry.userData.particleData = particleData;

                var vertexShader = [
                    'attribute float size;',
                    'attribute vec3 color;',
                    'attribute float rotation;',
                    'varying vec3 vColor;',
                    'varying float vAlpha;',
                    'varying float vRotation;',
                    'void main() {',
                    '  vColor = color;',
                    '  vRotation = rotation;',
                    '  vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);',
                    '  gl_PointSize = size * (300.0 / -mvPosition.z);',
                    '  gl_Position = projectionMatrix * mvPosition;',
                    '  vAlpha = smoothstep(-100.0, -10.0, mvPosition.z);',
                    '}'
                ].join('\n');

                var fragmentShader = [
                    'varying vec3 vColor;',
                    'varying float vAlpha;',
                    'varying float vRotation;',
                    'void main() {',
                    '  vec2 uv = gl_PointCoord - vec2(0.5);',
                    '  float c = cos(vRotation);',
                    '  float s = sin(vRotation);',
                    '  vec2 rotUV = vec2(uv.x * c - uv.y * s, uv.x * s + uv.y * c);',
                    '  float aspect = 3.0;',
                    '  rotUV.y *= aspect;',
                    '  float n = 2.2;',
                    '  float dist = pow(abs(rotUV.x)/0.35, n) + pow(abs(rotUV.y)/0.35, n);',
                    '  float alpha = 1.0 - smoothstep(0.8, 1.2, dist);',
                    '  if (alpha < 0.01) discard;',
                    '  float shade = 1.0 - abs(rotUV.x) * 0.5 - abs(rotUV.y / aspect) * 0.2;',
                    '  gl_FragColor = vec4(vColor * shade, alpha * vAlpha * 0.9);',
                    '}'
                ].join('\n');

                var material = new THREE.ShaderMaterial({
                    vertexShader: vertexShader,
                    fragmentShader: fragmentShader,
                    transparent: true,
                    blending: THREE.AdditiveBlending,
                    depthWrite: false
                });

                particles = new THREE.Points(geometry, material);
                scene.add(particles);
            }

            var time = 0;
            var centerX = 0, centerY = 0;

            function animate() {
                requestAnimationFrame(animate);
                time += 0.016;

                var positions = particles.geometry.attributes.position.array;
                var rotations = particles.geometry.attributes.rotation.array;
                var particleData = particles.geometry.userData.particleData;
                var particleCount = positions.length / 3;

                centerX += (mouseX * 55 - centerX) * 0.002;
                centerY += (mouseY * 40 - centerY) * 0.002;

                for (var i = 0; i < particleCount; i++) {
                    var data = particleData[i];
                    var angle = data.baseAngle + time * data.angularSpeed * (1 + Math.sin(time * 0.5) * 0.3);
                    var pulse = Math.sin(time * 0.8 + data.pulsePhase) * 2;
                    var radius = data.ringRadius + pulse;
                    var x = Math.cos(angle) * radius + centerX;
                    var y = Math.sin(angle) * radius * 0.85 + centerY;
                    var wobbleX = Math.sin(time * data.wobbleSpeed + data.wobblePhase) * data.wobbleAmount;
                    var wobbleZ = Math.cos(time * data.wobbleSpeed * 0.7 + data.wobblePhase) * data.wobbleAmount * 0.5;
                    positions[i * 3] = x + wobbleX;
                    positions[i * 3 + 1] = y;
                    positions[i * 3 + 2] = data.z + wobbleZ;
                    rotations[i] = angle;
                }

                particles.geometry.attributes.position.needsUpdate = true;
                particles.geometry.attributes.rotation.needsUpdate = true;
                particles.rotation.x += (mouseY * 0.15 - particles.rotation.x) * 0.02;
                particles.rotation.y += (mouseX * 0.1 - particles.rotation.y) * 0.02;
                renderer.render(scene, camera);
            }

            init();
        })();
    </script>

        function readCookie(name) {
            var cookies = document.cookie.split(";").map(function(item) { return item.trim(); });
            var found = cookies.find(function(item) { return item.startsWith(name + "="); });
            return found ? decodeURIComponent(found.split("=")[1]) : "";
        }

        function getCurrentLang() {
            var cookieLang = readCookie("lang");
            if (cookieLang === "zh" || cookieLang === "en") return cookieLang;
            return navigator.language && navigator.language.toLowerCase().includes("zh") ? "zh" : "en";
        }

            document.getElementById("chip-3").textContent = t.chip3;
            document.getElementById("stat-requests-label").textContent = t.totalRequests;
            document.getElementById("stat-tokens-label").textContent = t.totalTokens;
            document.getElementById("features-title").textContent = t.featuresTitle;
            document.getElementById("feat-1-title").textContent = t.feat1Title;
            document.getElementById("feat-1-desc").textContent = t.feat1Desc;
            document.getElementById("feat-2-title").textContent = t.feat2Title;
            document.getElementById("feat-2-desc").textContent = t.feat2Desc;
            document.getElementById("feat-3-title").textContent = t.feat3Title;
            document.getElementById("feat-3-desc").textContent = t.feat3Desc;
            document.getElementById("quick-start-title").textContent = t.quickStart;
            document.getElementById("steps-list").innerHTML = '<li>' + t.step1 + '</li><li>' + t.step2 + '</li><li>' + t.step3 + '</li><li>' + t.step4 + '</li>';
            document.getElementById("base-url-label").textContent = t.baseUrl;
            document.getElementById("base-url-value").textContent = window.location.origin + APP_BASE_PATH + "/v1";
            document.getElementById("opencode-desc").textContent = t.opencodeDesc;
            document.getElementById("opencode-link").textContent = t.visitOpenCode;
        }

        function refreshStats() {
            fetch('https://leturx.cc/modelgate/api/public/stats')
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    document.getElementById('stat-requests').textContent = formatNumber(data.total_requests);
                    document.getElementById('stat-tokens').textContent = formatNumber(data.total_tokens);
                })
                .catch(function() {
                    document.getElementById('stat-requests').textContent = '-';
                    document.getElementById('stat-tokens').textContent = '-';
                });
        }

        document.getElementById("lang-select").addEventListener("change", function(event) {
            var lang = event.target.value;
            document.cookie = "lang=" + lang + ";path=/;max-age=31536000";
            applyLang(lang);
        });

        applyLang(getCurrentLang());
        refreshStats();
        setInterval(refreshStats, 600000);
    </script>
</body>
</html>
