    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #09090b;
            --bg-alt: #f0faf4;
            --bg-alt-text: #09090b;
            --bg-alt-muted: #3d5a4a;
            --accent: #22c55e;
            --accent-dim: #16a34a;
            --accent-bright: #4ade80;
            --accent-subtle: rgba(34, 197, 94, 0.08);
            --accent-border: rgba(34, 197, 94, 0.15);
            --text: #fafafa;
            --text-muted: #a1a1aa;
            --text-faint: #71717a;
            --border: rgba(255, 255, 255, 0.06);
            --border-hover: rgba(255, 255, 255, 0.12);
            --mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, monospace;
            --sans: 'Instrument Sans', system-ui, -apple-system, sans-serif;
        }

        body {
            font-family: var(--sans);
            background: var(--bg);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            font-size: 16px;
            line-height: 1.6;
        }

        .mono {
            font-family: var(--mono);
        }

        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            height: 56px;
            background: rgba(9, 9, 11, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
        }

        .nav-inner {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: var(--text);
        }

        .nav-brand span {
            font-weight: 600;
            font-size: 15px;
            letter-spacing: -0.01em;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .nav-link {
            font-size: 14px;
            color: var(--text-faint);
            text-decoration: none;
            transition: color 0.2s;
        }

        .nav-link:hover { color: var(--text); }

        .lang-select {
            appearance: none;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 4px 8px;
            color: var(--text-muted);
            font-family: var(--mono);
            font-size: 12px;
            cursor: pointer;
            outline: none;
            transition: border-color 0.2s;
        }

        .lang-select:hover { border-color: var(--border-hover); }

        .section-label {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: var(--mono);
            font-size: 12px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--accent);
            margin-bottom: 20px;
        }

        .section-label-dot {
            width: 6px;
            height: 6px;
            border-radius: 1px;
            background: var(--accent);
        }

        .hero {
            padding: 160px 24px 80px;
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
        }

        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 5px 14px;
            border-radius: 100px;
            border: 1px solid var(--accent-border);
            background: var(--accent-subtle);
            font-family: var(--mono);
            font-size: 12px;
            color: var(--accent);
            font-weight: 500;
            letter-spacing: 0.02em;
            margin-bottom: 32px;
        }

        .hero-badge-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--accent);
            animation: blink 2s ease-in-out infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .hero h1 {
            font-size: clamp(40px, 6vw, 72px);
            line-height: 1.05;
            font-weight: 500;
            letter-spacing: -0.035em;
            max-width: 720px;
            color: var(--text);
        }

        .hero h1 .accent {
            color: var(--accent);
        }

        .hero-desc {
            margin-top: 24px;
            font-size: 17px;
            line-height: 1.7;
            color: var(--text-muted);
            max-width: 520px;
        }

        .hero-actions {
            margin-top: 36px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s;
            border: none;
            font-family: var(--sans);
        }

        .btn-primary {
            background: var(--accent);
            color: #09090b;
        }

        .btn-primary:hover {
            background: var(--accent-bright);
            box-shadow: 0 0 20px rgba(34, 197, 94, 0.25);
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid var(--border-hover);
            color: var(--text-muted);
        }

        .btn-secondary:hover {
            border-color: rgba(255, 255, 255, 0.2);
            color: var(--text);
        }

        .stats-bar {
            margin-top: 64px;
            padding: 32px 0;
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
        }

        .stats-inner {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            gap: 0;
        }

        .stat-item {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 8px 0;
            position: relative;
        }

        .stat-item + .stat-item {
            padding-left: 32px;
        }

        .stat-item + .stat-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 4px;
            bottom: 4px;
            width: 1px;
            background: var(--border);
        }

        .flip-container {
            perspective: 800px;
        }

        .flip-inner {
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1);
            transform-style: preserve-3d;
            position: relative;
        }

        .flip-inner.flipped {
            transform: rotateY(180deg);
        }

        .flip-face {
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }

        .flip-back {
            position: absolute;
            inset: 0;
            transform: rotateY(180deg);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .stat-number {
            font-family: var(--mono);
            font-size: clamp(28px, 3vw, 40px);
            font-weight: 600;
            letter-spacing: -0.02em;
            color: var(--accent);
            font-variant-numeric: tabular-nums;
        }

        .stat-label {
            font-size: 13px;
            color: var(--text-faint);
            margin-top: 4px;
        }

        .stat-tag {
            display: inline-block;
            font-family: var(--mono);
            font-size: 10px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            padding: 2px 8px;
            border-radius: 4px;
            margin-top: 6px;
        }

        .stat-tag-total {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-muted);
            border: 1px solid var(--border);
        }

        .stat-tag-today {
            background: var(--accent-subtle);
            color: var(--accent);
            border: 1px solid var(--accent-border);
        }

        .alt-section {
            background: var(--bg-alt);
            color: var(--bg-alt-text);
            padding: 96px 24px;
        }

        .alt-section .section-label { color: var(--accent-dim); }
        .alt-section .section-label-dot { background: var(--accent-dim); }

        .section-inner {
            max-width: 1200px;
            margin: 0 auto;
        }

        .section-title {
            font-size: clamp(28px, 4vw, 44px);
            font-weight: 500;
            letter-spacing: -0.03em;
            line-height: 1.15;
            max-width: 560px;
        }

        .section-subtitle {
            margin-top: 16px;
            font-size: 16px;
            line-height: 1.7;
            color: var(--bg-alt-muted);
            max-width: 480px;
        }

        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1px;
            margin-top: 48px;
            background: rgba(0, 0, 0, 0.06);
            border: 1px solid rgba(0, 0, 0, 0.06);
            border-radius: 12px;
            overflow: hidden;
        }

        .feature-card {
            background: var(--bg-alt);
            padding: 32px;
            transition: background 0.2s;
        }

        .feature-card:hover {
            background: rgba(255, 255, 255, 0.7);
        }

        .feature-icon {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .feature-card h3 {
            margin-top: 16px;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: -0.01em;
        }

        .feature-card p {
            margin-top: 8px;
            font-size: 14px;
            line-height: 1.6;
            color: var(--bg-alt-muted);
        }

        .terminal-section {
            padding: 96px 24px;
        }

        .terminal-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 48px;
            align-items: start;
        }

        .terminal {
            background: #0c0c0e;
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }

        .terminal-header {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .terminal-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
        }

        .terminal-dot:first-child { background: #ef4444; }
        .terminal-dot:nth-child(2) { background: #eab308; }
        .terminal-dot:nth-child(3) { background: #22c55e; }

        .terminal-title {
            margin-left: 8px;
            font-family: var(--mono);
            font-size: 12px;
            color: var(--text-faint);
        }

        .terminal-body {
            padding: 20px;
            font-family: var(--mono);
            font-size: 13px;
            line-height: 1.8;
        }

        .terminal-body .comment { color: #52525b; }
        .terminal-body .keyword { color: var(--accent); }
        .terminal-body .string { color: #fbbf24; }
        .terminal-body .url { color: #60a5fa; }

        .steps-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-top: 32px;
        }

        .step-item {
            display: flex;
            gap: 16px;
            align-items: flex-start;
            font-size: 15px;
            line-height: 1.5;
            color: var(--text-muted);
            opacity: 0;
            transform: translateX(-8px);
            transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .step-item.visible {
            opacity: 1;
            transform: translateX(0);
        }

        .step-num {
            font-family: var(--mono);
            font-size: 12px;
            font-weight: 600;
            color: var(--accent);
            background: var(--accent-subtle);
            border: 1px solid var(--accent-border);
            border-radius: 6px;
            min-width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .cta-section {
            padding: 96px 24px;
            border-top: 1px solid var(--border);
            text-align: center;
        }

        .cta-section h2 {
            font-size: clamp(32px, 5vw, 56px);
            font-weight: 500;
            letter-spacing: -0.03em;
            line-height: 1.1;
        }

        .cta-section h2 .accent { color: var(--accent); }

        .cta-actions {
            margin-top: 36px;
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
            align-items: center;
        }

        .cli-command {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: var(--mono);
            font-size: 13px;
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-muted);
        }

        .cli-command .prefix { color: var(--accent); }

        footer {
            border-top: 1px solid var(--border);
            padding: 24px;
            text-align: center;
        }

        .footer-link {
            font-size: 13px;
            color: var(--text-faint);
            text-decoration: none;
            transition: color 0.2s;
        }

        .footer-link:hover { color: var(--text-muted); }

        .scroll-reveal {
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.6s cubic-bezier(0.25, 1, 0.5, 1), transform 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .scroll-reveal.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .divider {
            max-width: 1200px;
            margin: 0 auto;
            height: 1px;
            background: var(--border);
        }

        @media (max-width: 768px) {
            .stats-inner {
                flex-direction: column;
                gap: 24px;
            }
            .stat-item + .stat-item {
                padding-left: 0;
            }
            .stat-item + .stat-item::before {
                display: none;
            }
            .terminal-layout {
                grid-template-columns: 1fr;
            }
            .features-grid {
                grid-template-columns: 1fr;
            }
            .hero {
                padding: 120px 24px 60px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .scroll-reveal { opacity: 1; transform: none; transition: none; }
            .step-item { opacity: 1; transform: none; transition: none; }
            .flip-inner { transition: none; }
            .hero-badge-dot { animation: none; }
        }
    </style>
</head>

    <nav>

                <span id="quickstart-section-label"></span>
            </div>

    function readCookie(name) {
        var cookies = document.cookie.split(";").map(function(item) { return item.trim(); });
        var found = cookies.find(function(item) { return item.startsWith(name + "="); });
        return found ? decodeURIComponent(found.split("=")[1]) : "";
    }

    function getCurrentLang() {
        var cookieLang = readCookie("lang");
        if (cookieLang === "zh" || cookieLang === "en") return cookieLang;
        return navigator.language && navigator.language.toLowerCase().includes("zh") ? "zh" : "en";
    }

    function springCounter(el, target) {
        if (!target && target !== 0) { el.textContent = "-"; return; }
        var stiffness = 280;
        var damping = 50;
        var mass = 1;
        var precision = 0.5;
        var position = 0;
        var velocity = 0;
        var lastTime = null;
        function step(ts) {
            if (lastTime === null) lastTime = ts;
            var dt = Math.min((ts - lastTime) / 1000, 0.064);
            lastTime = ts;
            var springForce = -stiffness * (position - target);
            var dampingForce = -damping * velocity;
            var acceleration = (springForce + dampingForce) / mass;
            velocity += acceleration * dt;
            position += velocity * dt;
            el.textContent = Math.round(position).toLocaleString();
            if (Math.abs(velocity) > precision || Math.abs(position - target) > precision) {
                requestAnimationFrame(step);
            } else {
                el.textContent = target.toLocaleString();
            }
        }
        requestAnimationFrame(step);
    }

    function applyLang(lang) {
        var t = translations[lang] || translations.en;
        document.documentElement.lang = lang;

    var flipInterval = null;
    var isFlipped = false;

    function startFlipCycle() {
        if (flipInterval) return;
        flipInterval = setInterval(function() {
            var cardReq = document.querySelector("#flip-requests .flip-inner");
            var cardTok = document.querySelector("#flip-tokens .flip-inner");
            isFlipped = !isFlipped;
            if (isFlipped) {
                cardReq.classList.add("flipped");
                setTimeout(function() { cardTok.classList.add("flipped"); }, 500);
            } else {
                cardReq.classList.remove("flipped");
                setTimeout(function() { cardTok.classList.remove("flipped"); }, 500);
            }
        }, 4000);
    }

    function refreshStats() {
        fetch("https://leturx.cc/modelgate/api/public/stats")
            .then(function(r) { return r.json(); })
            .then(function(data) {
                springCounter(document.getElementById("stat-requests"), data.total_requests);
                springCounter(document.getElementById("stat-tokens"), data.total_tokens);
                springCounter(document.getElementById("stat-today-requests"), data.today_requests || 0);
                springCounter(document.getElementById("stat-today-tokens"), data.today_tokens || 0);
                startFlipCycle();
            })
            .catch(function() {
                document.getElementById("stat-requests").textContent = "-";
                document.getElementById("stat-tokens").textContent = "-";
                document.getElementById("stat-today-requests").textContent = "-";
                document.getElementById("stat-today-tokens").textContent = "-";
            });
    }

    document.getElementById("lang-select").addEventListener("change", function(event) {
        var lang = event.target.value;
        document.cookie = "lang=" + lang + ";path=/;max-age=31536000";
        applyLang(lang);
    });

    var observer = new IntersectionObserver(function(entries) {
        entries.forEach(function(entry) {
            if (entry.isIntersecting) {
                entry.target.classList.add("visible");
                var steps = entry.target.querySelectorAll(".step-item");
                steps.forEach(function(s) { s.classList.add("visible"); });
            }
        });
    }, { threshold: 0.1 });

    document.querySelectorAll(".scroll-reveal").forEach(function(el) {
        observer.observe(el);
    });

    applyLang(getCurrentLang());
    refreshStats();
    setInterval(refreshStats, 600000);
