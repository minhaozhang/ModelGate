{% macro admin_page_header(title, subtitle='') -%}
<div class="flex justify-between items-center mb-6 gap-4">
    <div class="min-w-0">
        <h2 class="text-2xl font-bold text-gray-800">{{ title }}</h2>
        {% if subtitle %}
        <p class="text-sm text-gray-500 mt-1">{{ subtitle }}</p>
        {% endif %}
    </div>
    <div class="flex items-center gap-3">
        <select id="theme-toggle" onchange="applyTheme(this.value)" class="border border-gray-200 bg-white text-gray-700 px-3 py-2 rounded text-sm cursor-pointer">
            <option value="dark">{{ _('Dark Mode') }}</option>
            <option value="light">{{ _('Light Mode') }}</option>
        </select>
        {{ caller() }}
    </div>
</div>
{%- endmacro %}
